name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Node syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax for all src files
        run: |
          find src -name '*.js' -type f -print0 | xargs -0 -n1 node --check

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      - name: Validate JSON configs
        run: |
          for f in $(find . -maxdepth 2 -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            echo "Checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f'))"
          done

  test:
    name: Unit tests shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm run test:shard -- ${{ matrix.shard }} 4

  build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [syntax, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: windsurf-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
