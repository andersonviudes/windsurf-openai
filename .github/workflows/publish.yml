name: Publish

# Runs after the Release workflow finishes (see .github/workflows/release.yml):
# publishes the package to npmjs.
#
# Chained via `workflow_run` rather than `release: published` on purpose: a
# Release created by the default GITHUB_TOKEN does not fire the `release` event
# for other workflows (GitHub's no-recursion rule), so `release: published`
# would silently never run without a PAT. `workflow_run` fires on the workflow
# completing regardless of token, needing no extra secret.
#
# The Release runs via workflow_dispatch *on main* (not a tag), so
# github.event.workflow_run.head_branch is `main`. We therefore check out main
# HEAD — which is the bump commit/tag the Release just pushed — and derive the
# version from package.json instead of from the workflow_run metadata.
on:
  workflow_run:
    workflows: [Release]
    types: [completed]

jobs:
  npm:
    name: npm Publish
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # need tags for the version==tag guard

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Guard: the vX.Y.Z tag for this package.json version must exist, so we
      # never publish a version the Release workflow didn't actually tag.
      - name: Verify tag matches package.json version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git rev-parse "v$VERSION" >/dev/null 2>&1 || { echo "tag v$VERSION not found"; exit 1; }
          echo "Publishing $(node -p "require('./package.json').name")@$VERSION"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
