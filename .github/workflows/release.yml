name: Release

# Manually-triggered release: bump the version, tag it, build the standalone
# binaries, and cut the GitHub Release with an auto-generated changelog. The
# Docker image and the npm publish happen afterwards in publish.yml, which is
# chained off this workflow completing (see .github/workflows/publish.yml).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump for this release'
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Secret scan
        run: npm run secret-scan

      - name: Run tests
        run: npm run test:release

  release:
    name: Bump, build binaries & GitHub Release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # full history + tags for npm version / changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bumps package.json, creates the release commit and the vX.Y.Z tag.
      - name: Bump version
        id: bump
        run: |
          npm version "${{ inputs.bump }}" -m "chore: release v%s"
          NEW="$(node -p "require('./package.json').version")"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      # Pushes the bump commit + tag to main; publish.yml later checks out main
      # to pick up this exact version. Requires main to allow the bot to push.
      - name: Push commit + tag to main
        run: git push origin HEAD:main --follow-tags

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Reads the (now bumped) package.json version, so the binaries carry it.
      - name: Build standalone binaries
        run: npm run build:exe:all

      # Grouped, conventional-commit changelog (Features / Bug Fixes / ...).
      - name: Generate changelog
        run: node scripts/changelog.mjs "${{ steps.bump.outputs.version }}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: Release ${{ steps.bump.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: dist/windsurf-api-*
          draft: false
          prerelease: false
